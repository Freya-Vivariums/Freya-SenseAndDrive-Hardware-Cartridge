<!-- This configuration file specifies the required security policies
     for the freya.cartridge.sensendrive service to work -->

<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
 
<busconfig>
    <!-- Root policy -->
    <policy user="root">
        <allow own="freya.cartridge.sensendrive"/>
        <allow send_destination="freya.cartridge.sensendrive"/>
        <allow receive_sender="freya.cartridge.sensendrive"/>
    </policy>
</busconfig>
